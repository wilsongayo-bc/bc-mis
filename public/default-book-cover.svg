<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4b5563;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Book cover background -->
  <rect width="300" height="400" fill="url(#bookGradient)" rx="8" ry="8"/>
  
  <!-- Book spine effect -->
  <rect x="0" y="0" width="12" height="400" fill="url(#spineGradient)" rx="8" ry="8"/>
  
  <!-- Inner border -->
  <rect x="20" y="20" width="260" height="360" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" rx="4" ry="4"/>
  
  <!-- Book icon -->
  <g transform="translate(150, 120)">
    <!-- Open book pages -->
    <path d="M-40 -20 L-5 -20 L-5 40 L-40 40 Z" fill="rgba(255,255,255,0.9)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <path d="M5 -20 L40 -20 L40 40 L5 40 Z" fill="rgba(255,255,255,0.9)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Book binding -->
    <rect x="-5" y="-20" width="10" height="60" fill="rgba(255,255,255,0.8)"/>
    
    <!-- Page lines -->
    <line x1="-30" y1="-10" x2="-15" y2="-10" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
    <line x1="-30" y1="-5" x2="-15" y2="-5" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
    <line x1="-30" y1="0" x2="-15" y2="0" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
    <line x1="-30" y1="5" x2="-15" y2="5" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
    
    <line x1="15" y1="-10" x2="30" y2="-10" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
    <line x1="15" y1="-5" x2="30" y2="-5" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
    <line x1="15" y1="0" x2="30" y2="0" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
    <line x1="15" y1="5" x2="30" y2="5" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
  </g>
  
  <!-- Title placeholder -->
  <text x="150" y="250" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
    Book Title
  </text>
  
  <!-- Author placeholder -->
  <text x="150" y="280" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="14">
    Author Name
  </text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="350" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="250" cy="350" r="3" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Subtle shadow effect -->
  <rect x="285" y="15" width="15" height="385" fill="rgba(0,0,0,0.1)" rx="8" ry="8"/>
  <rect x="15" y="385" width="285" height="15" fill="rgba(0,0,0,0.1)" rx="8" ry="8"/>
</svg>